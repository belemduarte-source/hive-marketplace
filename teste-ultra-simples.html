<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100vw; height: 100vh; background: blue; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    alert('Script iniciado');

    const map = L.map('map').setView([40, -8], 6);
    alert('Mapa criado');

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    alert('Tile layer adicionado');

    const marker = L.marker([38.7, -9.1]).addTo(map);
    alert('Marcador adicionado em Lisboa');

    marker.bindPopup('Olá!').openPopup();
    alert('Popup aberto');
  </script>
</body>
</html>
